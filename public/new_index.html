<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #36d1dc, #5b86e5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .dashboard {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      max-width: 1200px;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      padding: 20px;
      width: 250px;
      height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .icon {
      width: 40px;
      height: 40px;
      background-color: #f1f1f1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="card">
      <div class="card-header">
        <div class="icon">🌡️</div>
        <div class="value" id="temperature">22°C</div>
      </div>
      <!-- Θα μπει slider με παλιές τιμές θερμοκρασίας εδώ -->
    </div>

    <div class="card">
      <div class="card-header">
        <div class="icon">💧</div>
        <div class="value" id="humidity">55%</div>
      </div>
      <!-- Θα μπει slider με παλιές τιμές υγρασίας εδώ -->
    </div>

    <!-- Θα προστεθούν άλλες 2 κάρτες για πίεση και ποιότητα αέρα -->
  </div>

  <script>
    // Αυτόματο refresh demo
    setInterval(() => {
      document.getElementById("temperature").textContent = (20 + Math.random() * 10).toFixed(1) + "°C";
      document.getElementById("humidity").textContent = (40 + Math.random() * 30).toFixed(1) + "%";
    }, 5000);
  </script>
</body>
</html>
