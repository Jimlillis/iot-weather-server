<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>live Μετρήσεις Ατμοσφαιρικών Συνθηκών</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
        table { width: 90%; margin: auto; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>

    <h1>Μετρήσεις Ατμοσφαιρικών Συνθηκών</h1>
    <button onclick="fetchData()">Ανανέωση Δεδομένων</button>
    <table>
        <thead>
            <tr>
                <th>Θερμοκρασία (°C)</th>
                <th>Υγρασία (%)</th>
                <th>Πίεση (hPa)</th>
                <th>Ποιότητα Αέρα</th>
                <th>Χρόνος της μέτρησης</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <!-- Τα δεδομένα θα εμφανίζονται εδώ -->
        </tbody>
    </table>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('https://iot-weather-server.onrender.com/data');
                const data = await response.json();
                
                const tableBody = document.getElementById("data-table");
                tableBody.innerHTML = "";

                data.forEach(entry => {
                    const row = `<tr>
                        <td>${entry.temperature} °C</td>
                        <td>${entry.humidity} %</td>
                        <td>${entry.pressure} hPa</td>
                        <td>${entry.air_quality}</td>
                        <td>${new Date(entry.timestamp).toLocaleString()}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        fetchData(); // Αυτόματη φόρτωση δεδομένων μόλις ανοίξει η σελίδα
    </script>

</body>
</html>
