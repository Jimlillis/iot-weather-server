<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Environmental Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f4f8;
    }
    header {
      padding: 20px;
      text-align: center;
      background-color: #4a90e2;
      color: white;
      font-size: 24px;
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }
    .card {
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      width: 300px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }
    .card .icon {
      font-size: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: rotate(-90deg);
    }
    .card .value {
      font-size: 28px;
      font-weight: bold;
    }
    .card-title {
      font-size: 18px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <header>Welcome, <span id="username">username</span></header>
  <div class="container">
    <div class="card">
      <div class="card-title">Temperature</div>
      <div class="icon">🌡️</div>
      <div class="value" id="tempValue">-- °C</div>
    </div>
    <div class="card">
      <div class="card-title">Humidity</div>
      <div class="icon">💧</div>
      <div class="value" id="humidityValue">-- %</div>
    </div>
    <div class="card">
      <div class="card-title">Pressure</div>
      <div class="icon">📉</div>
      <div class="value" id="pressureValue">-- hPa</div>
    </div>
    <div class="card">
      <div class="card-title">Air Quality</div>
      <div class="icon">🌫️</div>
      <div class="value" id="airQualityValue">-- AQI</div>
    </div>
  </div>

  <script>
    // Replace this with your own username logic
    const username = 'alexandroskosmidis';
    document.getElementById('username').textContent = username;

    // Simulated data updates (replace with real sensor fetching logic)
    function updateValues() {
      document.getElementById('tempValue').textContent = (20 + Math.random() * 10).toFixed(1) + ' °C';
      document.getElementById('humidityValue').textContent = (40 + Math.random() * 20).toFixed(1) + ' %';
      document.getElementById('pressureValue').textContent = (1000 + Math.random() * 20).toFixed(1) + ' hPa';
      document.getElementById('airQualityValue').textContent = (50 + Math.random() * 50).toFixed(0) + ' AQI';
    }

    setInterval(updateValues, 5000);
    updateValues();
  </script>
</body>
</html>
