<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Smart Home App - Μετρήσεις</title>
  <style>
    html {
      zoom: 0.9;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      width: 100%;
      background-color: #0072ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px 10px 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .top-bar button {
      background-color: white;
      color: #0072ff;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .top-bar button:hover {
      background-color: #e0e0e0;
    }

    .time-display {
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .container {
      background-color: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 960px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      background-color: #0072ff;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #005ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #0072ff;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    @media (max-width: 600px) {
      th, td {
        font-size: 12px;
        padding: 8px;
      }

      h1 {
        font-size: 20px;
      }

      .action-buttons {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="time-display" id="time-display">--:--:--</div>
    <button onclick="logout()">Αποσύνδεση</button>
  </div>

  <div class="container">
    <h1>Μετρήσεις Ατμοσφαιρικών Συνθηκών</h1>
    <div class="action-buttons">
      <button onclick="fetchData()">Ανανέωση Δεδομένων</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Θερμοκρασία (°C)</th>
          <th>Υγρασία (%)</th>
          <th>Πίεση (hPa)</th>
          <th>Ποιότητα Αέρα</th>
          <th>Χρόνος</th>
        </tr>
      </thead>
      <tbody id="data-table">
        <!-- Τα δεδομένα θα εμφανιστούν εδώ -->
      </tbody>
    </table>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const options = {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      };
      const formatted = now.toLocaleString('el-GR', options);
      document.getElementById("time-display").textContent = formatted;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function logout() {
      try {
        const res = await fetch('/logout', {
          method: 'POST',
          credentials: 'include'
        });
        if (res.ok) {
          window.location.href = '/login.html';
        } else {
          alert('Αποτυχία αποσύνδεσης');
        }
      } catch (err) {
        console.error('Σφάλμα κατά την αποσύνδεση:', err);
        alert('Προέκυψε σφάλμα κατά την αποσύνδεση');
      }
    }

    async function fetchData() {
      const tableBody = document.getElementById("data-table");
      tableBody.innerHTML = "";

      try {
        const response = await fetch('/data', {
          credentials: 'include'
        });

        if (!response.ok) {
          const errorMessage = await response.text();
          console.error("Σφάλμα HTTP:", response.status, errorMessage);

          tableBody.innerHTML = `
            <tr>
              <td colspan="5">Σφάλμα: ${response.status === 401 ? 'Δεν έχετε συνδεθεί. Παρακαλώ κάντε login.' : 'Αποτυχία ανάκτησης δεδομένων.'}</td>
            </tr>`;
          return;
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          console.error("Αναμενόταν array αλλά ήρθε:", data);
          tableBody.innerHTML = `
            <tr>
              <td colspan="5">Τα δεδομένα που λήφθηκαν δεν είναι έγκυρα.</td>
            </tr>`;
          return;
        }

        if (data.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="5">Δεν υπάρχουν διαθέσιμα δεδομένα.</td>
            </tr>`;
          return;
        }

        data.forEach(entry => {
          const row = `<tr>
              <td>${entry.temperature} °C</td>
              <td>${entry.humidity} %</td>
              <td>${entry.pressure} hPa</td>
              <td>${entry.air_quality}</td>
              <td>${new Date(entry.timestamp).toLocaleString()}</td>
          </tr>`;
          tableBody.innerHTML += row;
        });
      } catch (error) {
        console.error("Σφάλμα JavaScript κατά το fetch:", error);
        tableBody.innerHTML = `
          <tr>
            <td colspan="5">Σφάλμα κατά την ανάκτηση των δεδομένων.</td>
          </tr>`;
      }
    }
  </script>
</body>
</html>
